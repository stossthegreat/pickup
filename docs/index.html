<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mirrorly</title>
<style>
  :root { color-scheme: dark; }
  html, body {
    margin: 0; padding: 0;
    background: #0A0A0B; color: #ECECEE;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    min-height: 100vh; display: grid; place-items: center;
    -webkit-font-smoothing: antialiased;
  }
  main {
    text-align: center; padding: 32px;
    max-width: 480px;
  }
  h1 {
    font-family: "Playfair Display", Georgia, serif;
    font-size: 56px; font-weight: 800; margin: 0 0 8px;
    color: #E8222A; letter-spacing: -1.4px;
  }
  .tag {
    color: #888; font-size: 12px; letter-spacing: 3px;
    font-weight: 700; text-transform: uppercase; margin-bottom: 36px;
  }
  nav a {
    display: inline-block; margin: 0 8px;
    padding: 12px 22px;
    color: #ECECEE; text-decoration: none;
    font-size: 13px; letter-spacing: 1.6px; font-weight: 700;
    text-transform: uppercase;
    border: 1px solid #333; border-radius: 100px;
    transition: border-color 0.2s, color 0.2s;
  }
  nav a:hover { border-color: #E8222A; color: #E8222A; }
</style>
</head>
<body>
<main>
  <h1>Mirrorly</h1>
  <div class="tag">Measured · Not guessed</div>
  <nav>
    <a href="privacy.html">Privacy</a>
    <a href="terms.html">Terms</a>
  </nav>
</main>
</body>
</html>
