name: charmr
description: "Charmr — Practice on AI. Level up in real life."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  # UI
  google_fonts: ^6.2.1          # Playfair / Inter / Space Grotesk
  flutter_animate: ^4.5.2       # entrance + micro animations
  provider: ^6.1.2              # GameState (Aura level + metrics)
  http: ^1.2.0                  # backend wiring (/v1/date, /v1/coach)

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  assets:
    - assets/icons/appstore.png
    - assets/icons/playstore.png
    # Roleplay women renders — Image.asset uses an errorBuilder that falls
    # back to a glyph, so a missing file never breaks the build.
    - assets/characters/women/

# App launcher icons. Regenerate after swapping the masters:
#   dart run flutter_launcher_icons
flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path_ios:           "assets/icons/appstore.png"
  image_path_android:       "assets/icons/playstore.png"
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/icons/playstore.png"
  remove_alpha_ios: true
  min_sdk_android: 23
