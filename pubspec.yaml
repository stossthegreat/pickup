name: mirror
description: "Real facial geometry analysis. Not a rating. Measurements."
publish_to: 'none'
version: 1.0.0+34

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  go_router: ^14.6.3
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.2
  camera: 0.10.5+5
  google_mlkit_face_detection: ^0.13.0
  google_mlkit_face_mesh_detection: ^0.4.2
  provider: ^6.1.2
  http: ^1.2.0
  image: ^4.2.0
  shared_preferences: ^2.2.3
  path_provider: ^2.1.3
  share_plus: ^10.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  assets:
    - assets/icons/appstore.png
    - assets/icons/playstore.png

# Generates every iOS + Android launcher icon from two master PNGs.
# Run after dropping new masters:  dart run flutter_launcher_icons
flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path_ios:     "assets/icons/appstore.png"
  image_path_android: "assets/icons/playstore.png"
  remove_alpha_ios: true
  min_sdk_android: 23
