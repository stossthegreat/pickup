name: mirror
description: "Real facial geometry analysis. Not a rating. Measurements."
publish_to: 'none'
version: 1.1.9+93

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  go_router: ^14.6.3
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.2
  camera: 0.10.5+5
  google_mlkit_face_detection: ^0.13.0
  # Android-only — Google explicitly states this plugin's iOS impl is
  # "still in beta and only available for Android". On iOS we synthesise
  # an equivalent dense overlay from face contours via _buildSemanticMesh
  # in scan_screen.dart, populating canonical MediaPipe indices from ML
  # Kit contour data. No third-party iOS face-mesh dependency.
  google_mlkit_face_mesh_detection: ^0.4.2
  provider: ^6.1.2
  http: ^1.2.0
  image: ^4.2.0
  shared_preferences: ^2.2.3
  path_provider: ^2.1.3
  share_plus: ^10.0.2
  # RevenueCat SDK — single integration for App Store + Play Billing.
  # Handles subscriptions, one-time IAPs, receipt validation, and
  # restore-purchases. We use it for Mirrorly Pro (monthly/annual) and
  # the 20-credit one-time pack.
  purchases_flutter: ^8.2.2
  # Firebase Analytics — conversion-funnel telemetry only. Logs the
  # named events in lib/services/analytics_service.dart. No PII, no
  # advertising IDs, no user properties beyond an anonymous app
  # install ID. The Firebase config files (GoogleService-Info.plist
  # for iOS, google-services.json for Android) are dropped in by the
  # native side; the Flutter side just calls the SDK.
  firebase_core:      ^3.6.0
  firebase_analytics: ^11.3.3
  # Local notifications — the retention engine. Daily 8pm "log today"
  # streak nudge, rescan reminders at day 14 / 30, milestone celebrations.
  # Zero server dependency; scheduled on-device via the plugin. `timezone`
  # is required to schedule at a specific local-wall-clock time rather
  # than UTC.
  flutter_local_notifications: ^17.2.3
  timezone: ^0.9.4

  # ── AURALAY GRAFT (Eyes + Game tabs + voice AI) ─────────────────────────
  # Auralay imported its full charisma-training stack into Mirrorly:
  # gaze lessons (Eyes tab), Lucien voice roleplay (Game tab), shared
  # progress in the Progress tab.
  smooth_page_indicator: ^1.2.0+3
  # Mic recording for charisma drills + realtime voice. Pinned the same
  # way Auralay pinned camera 0.10.5+5 — moving versions breaks iOS.
  record: ^5.2.1
  # Played-back TTS clips from /v1/diablo/speak + /v1/villain/* /scene/turn.
  audioplayers: ^6.1.0
  # Low-latency PCM playback for OpenAI Realtime API audio deltas (the
  # Game tab Free Flow + Council voice surfaces stream PCM, not MP3).
  flutter_pcm_sound: ^3.0.0
  # WebSocket transport for the OpenAI Realtime API. Dart-only, no native.
  web_socket_channel: ^3.0.1
  # Keeps the screen on during eye-contact drills + voice sessions.
  wakelock_plus: ^1.2.1
  # Secure storage for the creator/diablo unlock flags (mirrors Auralay).
  flutter_secure_storage: ^9.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.1

# record 5.2.1 transitively pulls record_linux 0.7.2, which doesn't
# implement `startStream` — a method added in record_platform_interface
# 1.5.0 (which 5.2.1 also accepts). The Dart frontend compiles every
# referenced library regardless of target platform, so the iOS archive
# build fails in record_linux.dart with "missing implementations".
# Pinning record_linux to 1.x picks up the implementation matching the
# modern interface. iOS only links record_darwin, so this has zero
# runtime impact on iOS/Android — it just lets kernel_snapshot succeed.
# (Lifted verbatim from Auralay where this same fix was shipped.)
dependency_overrides:
  record_linux: ^1.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/appstore.png
    - assets/icons/playstore.png
    # Auralay-imported assets — MediaPipe FaceLandmarker model directory
    # (download .task file at runtime via assets/models/README.txt) +
    # voice coach clips for charisma drills (assets/voice/README.txt).
    - assets/models/
    - assets/voice/
    # Mirror-tab pre-scan before/after pair. Declared as a directory
    # so the build doesn't fail when the JPEGs haven't been dropped
    # yet — Flutter bundles whatever exists in the folder, and the
    # Image.asset errorBuilder in _BeforeAfterTile falls back to a
    # placeholder face icon when a specific file is missing. Drop
    # two JPEGs (before.jpg + after.jpg, 4:5 portrait, same face)
    # per assets/marketing/README.md and they auto-bundle on next
    # build — no pubspec edit needed.
    - assets/marketing/
    # Character renders — Lucien + roleplay women + gaze partners +
    # free-flow hero + scan split. Declared as directories so the
    # build never breaks before the JPEGs land. Every tab uses
    # Image.asset with an errorBuilder that falls back to a glyph,
    # so missing files render gracefully. See the README.md inside
    # each folder for the exact filenames and art-direction brief.
    - assets/characters/lucien/
    - assets/characters/women/
    - assets/eyes/
    - assets/eyes/partners/
    - assets/game/
    - assets/scan/

# Generates every iOS + Android launcher icon from two master PNGs.
# Run after dropping new masters:  dart run flutter_launcher_icons
#
# Adaptive icons (Android 8+): without these fields, modern Android shrinks
# the legacy square ic_launcher into the adaptive-icon safe zone and wraps
# it with a fat generated background — the result is a small floating icon
# with a thick outer ring. Fix: feed playstore.png to BOTH the legacy
# slot AND the adaptive foreground layer, with a solid black background
# that matches the artwork. The mesh now fills the visible mask instead
# of getting insetted into a 66%-scale sandbox.
flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path_ios:           "assets/icons/appstore.png"
  image_path_android:       "assets/icons/playstore.png"
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/icons/playstore.png"
  remove_alpha_ios: true
  min_sdk_android: 23
